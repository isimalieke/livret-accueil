<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carte d'accueil — Livret d'Accueil</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --cover: #2c3e50;
  --bg:    #f5f5f7;
  --card:  #ffffff;
  --text:  #1d1d1f;
  --text2: #6e6e73;
  --gold:  #c9a84c;
  --border:rgba(0,0,0,0.1);
  --green: #16a34a;
  --red:   #dc2626;
}

/* ── INTERFACE (masquée à l'impression) ── */
body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

.toolbar {
  background:var(--cover); padding:14px 20px;
  display:flex; align-items:center; justify-content:space-between;
  gap:12px; flex-wrap:wrap;
}
.toolbar-left { display:flex; align-items:center; gap:12px; }
.back-link { color:rgba(255,255,255,0.7); text-decoration:none; font-size:20px; }
.toolbar-title { color:#fff; font-size:14px; font-weight:600; }
.toolbar-sub   { color:rgba(255,255,255,0.55); font-size:11px; margin-top:1px; }

.format-btns { display:flex; gap:6px; }
.fmt-btn {
  padding:6px 14px; border-radius:20px; font-size:12px; font-weight:600;
  border:2px solid rgba(255,255,255,0.35); color:#fff; background:transparent;
  cursor:pointer; transition:all .15s;
}
.fmt-btn.active { background:#fff; color:var(--cover); border-color:#fff; }

.toolbar-right { display:flex; gap:8px; align-items:center; }
.lang-toggle { display:flex; gap:4px; }
.lang-btn {
  padding:5px 12px; border-radius:20px; font-size:12px; font-weight:600;
  border:1.5px solid rgba(255,255,255,0.35); color:rgba(255,255,255,0.7); background:transparent; cursor:pointer;
}
.lang-btn.active { border-color:#fff; color:#fff; }
.btn-print {
  padding:8px 20px; border-radius:8px; font-size:13px; font-weight:700;
  background:#fff; color:var(--cover); border:none; cursor:pointer;
}
.btn-print:hover { background:#f0f0f0; }

.preview-area {
  display:flex; align-items:flex-start; justify-content:center;
  padding:40px 20px 60px; min-height:calc(100vh - 64px);
}

/* ── LA CARTE (dimensions réelles en mm via transform) ── */
.card-wrap {
  position:relative;
  box-shadow:0 8px 40px rgba(0,0,0,0.15);
}

/* FORMATS */
.card-wrap.fmt-a5  { width:148mm; height:210mm; }
.card-wrap.fmt-a6  { width:105mm; height:148mm; }
.card-wrap.fmt-pc  { width:150mm; height:100mm; /* postcard paysage */ }

/* LA CARTE EN ELLE-MÊME */
.card {
  width:100%; height:100%;
  background:#fff;
  display:flex; flex-direction:column;
  overflow:hidden; position:relative;
}

/* Postcard : layout horizontal */
.fmt-pc .card { flex-direction:row; }

/* HEADER */
.c-header {
  background:var(--cover);
  padding:10px 14px;
  display:flex; align-items:center; gap:10px;
  flex-shrink:0;
}
.c-logo { height:28px; max-width:60px; object-fit:contain; filter:brightness(0) invert(1); display:none; }
.c-hotel-name { color:#fff; font-size:13px; font-weight:700; letter-spacing:0.5px; line-height:1.2; }
.c-hotel-city { color:rgba(255,255,255,0.6); font-size:9px; margin-top:1px; }

/* FORMAT A6 : header plus compact */
.fmt-a6 .c-header { padding:8px 12px; }
.fmt-a6 .c-hotel-name { font-size:11px; }

/* FORMAT PC : header vertical gauche */
.fmt-pc .c-header {
  flex-direction:column; justify-content:center; align-items:flex-start;
  width:38%; padding:14px 12px;
  border-right:1px solid rgba(255,255,255,0.1);
}
.fmt-pc .c-logo { height:24px; }
.fmt-pc .c-hotel-name { font-size:11px; }

/* BODY */
.c-body {
  flex:1; padding:10px 14px;
  display:flex; flex-direction:column; gap:8px;
  overflow:hidden;
}

/* FORMAT PC : body à droite */
.fmt-pc .c-body { padding:10px 12px; gap:6px; }

/* WIFI BLOCK */
.c-wifi {
  background:#f0f4f8; border-radius:8px; padding:8px 10px;
  display:grid; grid-template-columns:20px 1fr; gap:4px 8px; align-items:center;
}
.wifi-icon { font-size:16px; grid-row:span 2; align-self:center; }
.wifi-label { font-size:7.5px; text-transform:uppercase; letter-spacing:0.8px; color:var(--text2); font-weight:600; }
.wifi-val   { font-size:11px; font-weight:700; color:var(--text); word-break:break-all; }
.wifi-row   { display:contents; }

.fmt-a6 .wifi-val { font-size:10px; }
.fmt-pc .c-wifi   { padding:6px 8px; }
.fmt-pc .wifi-val { font-size:10px; }

/* QR + INFO GRID */
.c-qr-row {
  display:flex; gap:10px; align-items:flex-start; flex:1;
}
.c-qr-block {
  display:flex; flex-direction:column; align-items:center; gap:4px;
  flex-shrink:0;
}
.c-qr-label { font-size:7px; text-transform:uppercase; letter-spacing:0.6px; color:var(--text2); text-align:center; }
#qr-canvas { display:block; }

.c-info-col { flex:1; display:flex; flex-direction:column; gap:6px; }

/* INFO ITEMS */
.c-info-item { display:flex; align-items:flex-start; gap:7px; }
.c-info-icon { font-size:13px; flex-shrink:0; margin-top:1px; }
.c-info-content {}
.c-info-label { font-size:7.5px; text-transform:uppercase; letter-spacing:0.6px; color:var(--text2); font-weight:600; }
.c-info-val   { font-size:11px; font-weight:600; color:var(--text); margin-top:1px; line-height:1.3; }

.fmt-a6 .c-info-val { font-size:10px; }
.fmt-pc .c-info-val { font-size:10px; }

/* URGENCES */
.c-urgences {
  border-top:1px solid var(--border); padding-top:8px;
  display:flex; flex-wrap:wrap; gap:4px 12px;
}
.c-urg-item { display:flex; align-items:center; gap:4px; }
.c-urg-num  { font-size:10px; font-weight:700; color:var(--red); }
.c-urg-lbl  { font-size:8px; color:var(--text2); }

.fmt-a6 .c-urg-num  { font-size:9px; }
.fmt-pc .c-urg-num  { font-size:9px; }

/* FOOTER */
.c-footer {
  background:var(--bg); border-top:1px solid var(--border);
  padding:5px 14px;
  display:flex; justify-content:space-between; align-items:center;
  flex-shrink:0;
}
.c-footer-brand { font-size:7px; color:var(--text2); }
.c-footer-url   { font-size:7px; color:var(--cover); font-weight:600; }

.fmt-pc .c-footer { display:none; }

/* ── PRINT ── */
@media print {
  .toolbar, .preview-area > *:not(.card-wrap) { display:none !important; }
  body, html { background:#fff !important; margin:0; padding:0; }
  .preview-area { padding:0; min-height:0; justify-content:flex-start; }

  .card-wrap.fmt-a5 { width:148mm; height:210mm; box-shadow:none; }
  .card-wrap.fmt-a6 { width:105mm; height:148mm; box-shadow:none; }
  .card-wrap.fmt-pc { width:150mm; height:100mm; box-shadow:none; }

  @page { margin:0; size:auto; }
}
</style>
</head>
<body>

<!-- TOOLBAR (masquée à l'impression) -->
<div class="toolbar">
  <div class="toolbar-left">
    <a class="back-link" id="back-link" href="#">←</a>
    <div>
      <div class="toolbar-title">Carte d'accueil imprimable</div>
      <div class="toolbar-sub">Cliquez sur Imprimer pour obtenir votre carte</div>
    </div>
  </div>
  <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap">
    <div class="format-btns">
      <button class="fmt-btn active" onclick="setFormat('a5')">A5</button>
      <button class="fmt-btn" onclick="setFormat('a6')">A6</button>
      <button class="fmt-btn" onclick="setFormat('pc')">Postcard</button>
    </div>
    <div class="lang-toggle">
      <button class="lang-btn active" onclick="setLang('fr')">FR</button>
      <button class="lang-btn" onclick="setLang('en')">EN</button>
    </div>
    <button class="btn-print" onclick="window.print()">🖨️ Imprimer</button>
  </div>
</div>

<!-- PREVIEW -->
<div class="preview-area">
  <div class="card-wrap fmt-a5" id="card-wrap">
    <div class="card">

      <!-- HEADER -->
      <div class="c-header">
        <img id="c-logo" class="c-logo" src="" alt="Logo">
        <div>
          <div class="c-hotel-name" id="c-hotel-name">Nom de l'établissement</div>
          <div class="c-hotel-city" id="c-hotel-city">Ville · Pays</div>
        </div>
      </div>

      <!-- BODY (A5 / A6) -->
      <div class="c-body" id="c-body-main">

        <!-- WiFi -->
        <div class="c-wifi">
          <span class="wifi-icon">📶</span>
          <div class="wifi-row">
            <div class="wifi-label" id="lbl-wifi-net">Réseau WiFi</div>
            <div class="wifi-val" id="c-wifi-net">—</div>
          </div>
          <div></div><!-- spacer pour grid -->
          <div class="wifi-row">
            <div class="wifi-label" id="lbl-wifi-pwd">Mot de passe</div>
            <div class="wifi-val" id="c-wifi-pwd">—</div>
          </div>
        </div>

        <!-- QR + Infos -->
        <div class="c-qr-row">
          <div class="c-qr-block">
            <div id="qr-canvas"></div>
            <div class="c-qr-label" id="lbl-qr">Scannez pour<br>votre livret</div>
          </div>
          <div class="c-info-col">
            <div class="c-info-item">
              <span class="c-info-icon">🕙</span>
              <div class="c-info-content">
                <div class="c-info-label" id="lbl-checkout">Check-out</div>
                <div class="c-info-val" id="c-checkout">—</div>
              </div>
            </div>
            <div class="c-info-item">
              <span class="c-info-icon">📞</span>
              <div class="c-info-content">
                <div class="c-info-label" id="lbl-contact">Contact hôte</div>
                <div class="c-info-val" id="c-tel">—</div>
              </div>
            </div>
          </div>
        </div>

        <!-- Urgences -->
        <div class="c-urgences" id="c-urgences"></div>

      </div>

      <!-- FOOTER -->
      <div class="c-footer">
        <span class="c-footer-brand">Livret d'accueil digital · Assenka.com</span>
        <span class="c-footer-url" id="c-livret-url"></span>
      </div>

    </div>
  </div>
</div>

<script>
var _slug     = '';
var _lang     = 'fr';
var _fmt      = 'a5';
var _livretUrl = '';
var _qrInstance = null;

// Extraire slug depuis l'URL /{slug}/carte
(function() {
  var parts = window.location.pathname.split('/').filter(Boolean);
  if (parts.length >= 1) _slug = parts[0];
  _livretUrl = window.location.origin + '/' + _slug;
  document.getElementById('back-link').href = '/' + _slug;
})();

// ── FORMAT ──
function setFormat(f) {
  _fmt = f;
  var wrap = document.getElementById('card-wrap');
  wrap.className = 'card-wrap fmt-' + f;
  document.querySelectorAll('.fmt-btn').forEach(function(b) {
    b.classList.toggle('active', b.textContent.toLowerCase() === (f === 'pc' ? 'postcard' : f));
  });
  rebuildQr();
  updateLayout(f);
}

function updateLayout(f) {
  // Postcard : layout spécial géré en CSS
  // Pour A5 et A6, le layout est identique (colonne)
}

// ── LANGUE ──
var labels = {
  fr: {
    'lbl-wifi-net': 'Réseau WiFi',
    'lbl-wifi-pwd': 'Mot de passe',
    'lbl-qr':       'Scannez pour\nvotre livret',
    'lbl-checkout': 'Heure de départ',
    'lbl-contact':  'Contact hôte',
  },
  en: {
    'lbl-wifi-net': 'WiFi Network',
    'lbl-wifi-pwd': 'Password',
    'lbl-qr':       'Scan for\nyour guide',
    'lbl-checkout': 'Check-out time',
    'lbl-contact':  'Host contact',
  }
};

function setLang(l) {
  _lang = l;
  document.querySelectorAll('.lang-btn').forEach(function(b) {
    b.classList.toggle('active', b.textContent.toLowerCase() === l);
  });
  var lbls = labels[l];
  Object.keys(lbls).forEach(function(id) {
    var el = document.getElementById(id);
    if (el) el.innerHTML = lbls[id].replace(/\n/g, '<br>');
  });
  // Refresh content with new lang
  if (typeof CONFIG !== 'undefined') applyCarteConfig();
}

// ── QR CODE ──
function rebuildQr() {
  var container = document.getElementById('qr-canvas');
  container.innerHTML = '';
  var size = _fmt === 'a5' ? 90 : _fmt === 'a6' ? 72 : 70;
  try {
    _qrInstance = new QRCode(container, {
      text: _livretUrl || window.location.origin + '/' + _slug,
      width: size, height: size,
      colorDark: '#2c3e50',
      colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.M,
    });
  } catch(e) {
    container.textContent = '(QR)';
  }
}

// ── APPLIQUER LA CONFIG ──
function applyCarteConfig() {
  if (typeof CONFIG === 'undefined') return;
  var h = CONFIG.hotel || {};
  var p = CONFIG.pratique || {};
  var urg = (CONFIG.securite && CONFIG.securite.urgences) || [];

  // Header
  var el;
  el = document.getElementById('c-hotel-name');
  if (el) el.textContent = h.nom || 'Mon établissement';
  el = document.getElementById('c-hotel-city');
  if (el) el.textContent = [h.ville, h.pays].filter(Boolean).join(' · ');
  el = document.getElementById('c-logo');
  if (el && h.logo_url) { el.src = h.logo_url; el.style.display = 'block'; }

  // WiFi
  el = document.getElementById('c-wifi-net');
  if (el) el.textContent = p.wifi_reseau || '—';
  el = document.getElementById('c-wifi-pwd');
  if (el) el.textContent = p.wifi_mdp || '—';

  // Checkout
  el = document.getElementById('c-checkout');
  if (el) el.textContent = (CONFIG.checkout && CONFIG.checkout.heure) || p.checkout || '11h00';

  // Téléphone
  el = document.getElementById('c-tel');
  if (el) el.textContent = h.telephone || h.whatsapp || '—';

  // URL livret
  el = document.getElementById('c-livret-url');
  if (el) el.textContent = _livretUrl;

  // Urgences
  el = document.getElementById('c-urgences');
  if (el) {
    if (urg.length) {
      el.innerHTML = urg.slice(0, 4).map(function(u) {
        return '<div class="c-urg-item"><span class="c-urg-num">' + u.numero + '</span><span class="c-urg-lbl">' + ((_lang === 'fr') ? u.label_fr : (u.label_en || u.label_fr)) + '</span></div>';
      }).join('');
    } else {
      // Urgences par défaut Sénégal
      el.innerHTML = [
        ['15', _lang==='fr' ? 'SAMU' : 'SAMU'],
        ['17', _lang==='fr' ? 'Police' : 'Police'],
        ['18', _lang==='fr' ? 'Pompiers' : 'Fire'],
        ['33 889 38 38', _lang==='fr' ? 'Hôpital Principal' : 'Main Hospital'],
      ].map(function(u) {
        return '<div class="c-urg-item"><span class="c-urg-num">' + u[0] + '</span><span class="c-urg-lbl">' + u[1] + '</span></div>';
      }).join('');
    }
  }
}

// ── INIT ──
window.addEventListener('load', function() {
  rebuildQr();
  setLang('fr');
  // La config sera chargée par config.js (script suivant)
  // On attend qu'elle soit prête
  if (typeof CONFIG !== 'undefined') {
    applyCarteConfig();
  }
});

// applyConfig est appelée par config.js quand il est chargé
function applyConfig() {
  applyCarteConfig();
}
</script>

<!-- Config hôtel chargée dynamiquement depuis KV -->
<script src="config.js"></script>

</body>
</html>
