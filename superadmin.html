<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welkomeo · Supervision — Assenka</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --cover: #2c3e50;
  --blue:  #2563eb;
  --bg:    #f5f5f7;
  --card:  #ffffff;
  --text:  #1d1d1f;
  --text2: #6e6e73;
  --border:rgba(0,0,0,0.09);
  --green: #16a34a;
  --red:   #dc2626;
}
body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

/* LOGIN */
#login-screen { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:20px; }
.login-box { background:var(--cover); border-radius:16px; padding:40px 32px; width:100%; max-width:360px; text-align:center; }
.login-brand { font-family:'Cormorant Garamond',Georgia,serif; font-size:24px; font-weight:400; letter-spacing:1px; color:#C9A84C; margin-bottom:8px; text-transform:none; }
.login-title { font-size:22px; font-weight:700; color:#fff; margin-bottom:4px; }
.login-sub { font-size:13px; color:rgba(255,255,255,0.5); margin-bottom:28px; }
.login-box input { width:100%; padding:12px 16px; background:rgba(255,255,255,0.12); border:1.5px solid rgba(255,255,255,0.2); border-radius:10px; color:#fff; font-size:15px; text-align:center; outline:none; margin-bottom:12px; font-family:inherit; }
.login-box input::placeholder { color:rgba(255,255,255,0.3); }
.login-box input:focus { border-color:rgba(255,255,255,0.6); }
.login-box button { width:100%; padding:12px; background:#fff; color:var(--cover); border:none; border-radius:10px; font-size:15px; font-weight:700; cursor:pointer; }
.login-error { color:#ff9090; font-size:12px; margin-top:10px; display:none; }

/* PANEL */
#panel { display:none; max-width:960px; margin:0 auto; padding:24px 16px 60px; }

.topbar { background:var(--cover); color:#fff; border-radius:12px; padding:16px 20px; margin-bottom:20px; display:flex; justify-content:space-between; align-items:center; }
.topbar h1 { font-size:16px; font-weight:700; }
.topbar-right { display:flex; gap:10px; align-items:center; }
.stat-badge { background:rgba(255,255,255,0.15); padding:4px 12px; border-radius:20px; font-size:12px; font-weight:600; }
.btn-logout { background:transparent; border:1px solid rgba(255,255,255,0.35); color:#fff; padding:5px 14px; border-radius:8px; font-size:12px; cursor:pointer; }

/* STATS */
.stats-row { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:20px; }
.stat-card { background:var(--card); border-radius:12px; border:1px solid var(--border); padding:16px 20px; }
.stat-val  { font-size:28px; font-weight:700; color:var(--text); }
.stat-lbl  { font-size:11px; color:var(--text2); margin-top:4px; text-transform:uppercase; letter-spacing:0.5px; }

/* SEARCH */
.search-bar { display:flex; gap:10px; margin-bottom:16px; }
.search-bar input { flex:1; padding:10px 14px; background:var(--card); border:1px solid var(--border); border-radius:10px; font-size:14px; outline:none; }
.search-bar input:focus { border-color:var(--blue); }
.btn-refresh { padding:10px 18px; background:var(--blue); color:#fff; border:none; border-radius:10px; font-size:13px; font-weight:600; cursor:pointer; }

/* TABLE */
.table-wrap { background:var(--card); border-radius:12px; border:1px solid var(--border); overflow:hidden; }
.table-head { display:grid; grid-template-columns:2fr 1.8fr 1.2fr 1.6fr 1fr; gap:0; padding:10px 16px; background:var(--bg); border-bottom:1px solid var(--border); }
.th { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:0.6px; color:var(--text2); }
.hotel-row { display:grid; grid-template-columns:2fr 1.8fr 1.2fr 1.6fr 1fr; gap:0; padding:13px 16px; border-bottom:1px solid var(--border); align-items:center; transition:background .1s; }
.hotel-row:last-child { border-bottom:none; }
.hotel-row:hover { background:#fafafa; }
.h-nom    { font-weight:600; font-size:13px; }
.h-email  { font-size:12px; color:var(--text2); }
.h-date   { font-size:11px; color:var(--text2); }
.h-sub    { display:flex; flex-direction:column; gap:3px; }
.h-status { display:inline-block; padding:2px 8px; border-radius:10px; font-size:11px; font-weight:600; }
.s-trial   { background:#dbeafe; color:#1d4ed8; }
.s-active  { background:#dcfce7; color:#15803d; }
.s-expired { background:#fee2e2; color:#dc2626; }
.h-actions { display:flex; gap:5px; flex-wrap:wrap; }
.btn-view  { padding:4px 10px; background:#f0f4f8; border:1px solid #cbd5e1; color:var(--text); border-radius:6px; font-size:11px; cursor:pointer; text-decoration:none; font-weight:500; }
.btn-admin { padding:4px 10px; background:var(--cover); color:#fff; border:none; border-radius:6px; font-size:11px; cursor:pointer; text-decoration:none; font-weight:500; }
.btn-activate { padding:4px 10px; background:#16a34a; color:#fff; border:none; border-radius:6px; font-size:11px; cursor:pointer; font-weight:600; }
.btn-expire   { padding:4px 10px; background:#dc2626; color:#fff; border:none; border-radius:6px; font-size:11px; cursor:pointer; font-weight:500; }

/* MODAL ACTIVATION */
.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:100; display:none; align-items:center; justify-content:center; padding:20px; }
.modal-overlay.open { display:flex; }
.modal { background:#fff; border-radius:16px; padding:28px; width:100%; max-width:400px; }
.modal h3 { font-size:16px; font-weight:700; margin-bottom:16px; }
.modal label { display:block; font-size:12px; font-weight:600; color:var(--text2); text-transform:uppercase; margin-bottom:5px; margin-top:14px; }
.modal select, .modal input { width:100%; padding:9px 12px; border:1px solid #e2e8f0; border-radius:8px; font-size:14px; }
.modal-btns { display:flex; gap:10px; margin-top:20px; }
.modal-btns button { flex:1; padding:10px; border-radius:8px; font-size:14px; font-weight:600; cursor:pointer; border:none; }
.btn-cancel-modal { background:#f1f5f9; color:var(--text); }
.btn-confirm-modal { background:#16a34a; color:#fff; }

/* STATS abonnement */
.stats-row { display:grid; grid-template-columns:repeat(5,1fr); gap:12px; margin-bottom:20px; }

/* EMPTY */
.empty { text-align:center; padding:48px 20px; color:var(--text2); }
.empty-icon { font-size:40px; margin-bottom:12px; opacity:0.3; }

/* LOADING */
.loading { text-align:center; padding:32px; color:var(--text2); font-size:13px; }

@media(max-width:700px) {
  .stats-row { grid-template-columns:1fr 1fr; }
  .table-head, .hotel-row { grid-template-columns:1fr 1fr; }
  .th:nth-child(n+3), .hotel-row > *:nth-child(n+3) { display:none; }
  .h-actions { display:flex !important; }
  .hotel-row > *:nth-child(5) { display:flex !important; }
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-brand">Welkom<span style="color:#C9A84C">eo</span> · Supervision</div>
    <div class="login-title">🔐 Espace Admin</div>
    <div class="login-sub">Accès réservé à l'équipe Assenka</div>
    <input type="password" id="sa-pwd" placeholder="Mot de passe maître" onkeydown="if(event.key==='Enter') saLogin()">
    <button onclick="saLogin()">Accéder →</button>
    <div class="login-error" id="sa-error">Mot de passe incorrect.</div>
  </div>
</div>

<!-- PANEL -->
<div id="panel">
  <div class="topbar">
    <h1>🏢 Welkomeo · Supervision</h1>
    <div class="topbar-right">
      <span class="stat-badge" id="total-badge">0 hôtels</span>
      <button class="btn-logout" onclick="runMigration()" style="background:rgba(255,255,255,.12);margin-right:6px">⚙️ Migration</button>
      <button class="btn-logout" onclick="saLogout()">Déconnexion</button>
    </div>
  </div>

  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-val" id="stat-total">—</div>
      <div class="stat-lbl">Total</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" id="stat-trial" style="color:#1d4ed8">—</div>
      <div class="stat-lbl">Essai</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" id="stat-active" style="color:#15803d">—</div>
      <div class="stat-lbl">Actifs</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" id="stat-expired" style="color:#dc2626">—</div>
      <div class="stat-lbl">Expirés</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" id="stat-this-month">—</div>
      <div class="stat-lbl">Ce mois</div>
    </div>
  </div>

  <div class="search-bar">
    <input type="text" id="search-input" placeholder="Rechercher un hôtel, email, slug…" oninput="filterHotels()">
    <button class="btn-refresh" onclick="loadHotels()">↻ Actualiser</button>
  </div>

  <div class="table-wrap">
    <div class="table-head">
      <div class="th">Établissement</div>
      <div class="th">Email · Slug</div>
      <div class="th">Inscrit le</div>
      <div class="th">Abonnement</div>
      <div class="th">Actions</div>
    </div>
    <div id="hotels-list">
      <div class="loading">Chargement…</div>
    </div>
  </div>
</div>

<!-- MODAL ACTIVATION -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h3>⚡ Activer l'abonnement</h3>
    <p id="modal-hotel-name" style="font-size:13px;color:#64748b;margin-bottom:4px"></p>
    <label>Plan</label>
    <select id="modal-plan">
      <option value="small">Petit établissement — 7 500 / 75 000 FCFA</option>
      <option value="large">Grand hôtel — 15 000 / 150 000 FCFA</option>
    </select>
    <label>Période</label>
    <select id="modal-period">
      <option value="monthly">Mensuel (30 jours)</option>
      <option value="annual">Annuel (365 jours)</option>
    </select>
    <div class="modal-btns">
      <button class="btn-cancel-modal" onclick="closeModal()">Annuler</button>
      <button class="btn-confirm-modal" onclick="confirmActivate()">Activer →</button>
    </div>
  </div>
</div>

<script>
var _masterPwd    = '';
var _allHotels    = [];
var _baseUrl      = window.location.origin;
var _activateSlug = '';

// ── LOGIN ──
function saLogin() {
  var pwd = document.getElementById('sa-pwd').value;
  if (!pwd) return;
  _masterPwd = pwd;
  document.getElementById('sa-error').style.display = 'none';
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('panel').style.display = 'block';
  loadHotels();
}
function saLogout() {
  _masterPwd = ''; _allHotels = [];
  document.getElementById('panel').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('sa-pwd').value = '';
}

// ── CHARGER HÔTELS ──
async function loadHotels() {
  document.getElementById('hotels-list').innerHTML = '<div class="loading">⏳ Chargement…</div>';
  try {
    var resp = await fetch('/superadmin/hotels', { headers: { 'X-Auth-Secret': _masterPwd } });
    if (resp.status === 401) {
      document.getElementById('panel').style.display = 'none';
      document.getElementById('login-screen').style.display = 'flex';
      document.getElementById('sa-error').style.display = 'block';
      return;
    }
    var data = await resp.json();
    _allHotels = data.hotels || [];
    renderHotels(_allHotels);
    updateStats(_allHotels);
  } catch(e) {
    document.getElementById('hotels-list').innerHTML = '<div class="loading">❌ Erreur de connexion.</div>';
  }
}

// ── STATUT ABONNEMENT ──
function subStatus(h) {
  var status = h.subscription_status || 'trial';
  var endsAt = h.subscription_ends_at ? new Date(h.subscription_ends_at) : null;
  var daysLeft = endsAt ? Math.ceil((endsAt - Date.now()) / 86400000) : null;
  if (daysLeft !== null && daysLeft <= 0) status = 'expired';
  return { status: status, daysLeft: daysLeft, endsAt: endsAt };
}

function subBadge(h) {
  var s = subStatus(h);
  var plan = h.plan === 'large' ? 'Grand' : 'Petit';
  var period = h.billing_period === 'annual' ? '/an' : '/mois';
  if (s.status === 'trial') {
    var d = s.daysLeft !== null ? s.daysLeft : '?';
    return '<span class="h-status s-trial">Essai · ' + Math.max(0, d) + 'j</span>'
         + '<div style="font-size:10px;color:#64748b;margin-top:2px">' + plan + '</div>';
  }
  if (s.status === 'active') {
    var end = s.endsAt ? s.endsAt.toLocaleDateString('fr-FR') : '—';
    return '<span class="h-status s-active">Actif jusqu\'au ' + end + '</span>'
         + '<div style="font-size:10px;color:#64748b;margin-top:2px">' + plan + ' · ' + (h.billing_period||'—') + '</div>';
  }
  return '<span class="h-status s-expired">Expiré</span>'
       + '<div style="font-size:10px;color:#64748b;margin-top:2px">' + plan + '</div>';
}

// ── STATISTIQUES ──
function updateStats(hotels) {
  var now = new Date();
  var counts = { trial:0, active:0, expired:0, thisMonth:0 };
  hotels.forEach(function(h) {
    var s = subStatus(h).status;
    if (s === 'trial')   counts.trial++;
    else if (s === 'active') counts.active++;
    else counts.expired++;
    if (h.created_at) {
      var d = new Date(h.created_at);
      if (d.getMonth()===now.getMonth() && d.getFullYear()===now.getFullYear()) counts.thisMonth++;
    }
  });
  document.getElementById('stat-total').textContent      = hotels.length;
  document.getElementById('stat-trial').textContent      = counts.trial;
  document.getElementById('stat-active').textContent     = counts.active;
  document.getElementById('stat-expired').textContent    = counts.expired;
  document.getElementById('stat-this-month').textContent = counts.thisMonth;
  document.getElementById('total-badge').textContent     = hotels.length + ' hôtel' + (hotels.length>1?'s':'');
}

// ── AFFICHER LISTE ──
function renderHotels(hotels) {
  if (!hotels.length) {
    document.getElementById('hotels-list').innerHTML =
      '<div class="empty"><div class="empty-icon">🏨</div>Aucun établissement.</div>';
    return;
  }
  var html = hotels.map(function(h) {
    var date      = h.created_at ? new Date(h.created_at).toLocaleDateString('fr-FR') : '—';
    var livretUrl = _baseUrl + '/' + h.slug;
    var adminUrl  = _baseUrl + '/' + h.slug + '/admin';
    var s         = subStatus(h).status;
    return '<div class="hotel-row">'
      + '<div><div class="h-nom">' + esc(h.nom) + '</div>'
      + '<div style="font-size:10px;color:#9ca3af">' + esc(h.chambres||'—') + ' ch.</div></div>'
      + '<div><div class="h-email">' + esc(h.email||'—') + '</div>'
      + '<code style="font-size:10px;background:#f3f4f6;padding:1px 5px;border-radius:3px">/' + esc(h.slug) + '</code></div>'
      + '<div class="h-date">' + date + '</div>'
      + '<div class="h-sub">' + subBadge(h) + '</div>'
      + '<div class="h-actions">'
      + '<a href="' + livretUrl + '" target="_blank" class="btn-view">Livret</a>'
      + '<a href="' + adminUrl  + '" target="_blank" class="btn-admin">Admin</a>'
      + '<button class="btn-activate" onclick="openModal(\'' + esc(h.slug) + '\',\'' + esc(h.nom) + '\',\'' + (h.plan||'small') + '\')">Activer</button>'
      + (s!=='trial'?'<button class="btn-expire" onclick="expireHotel(\'' + esc(h.slug) + '\')">Expirer</button>':'')
      + '</div>'
      + '</div>';
  }).join('');
  document.getElementById('hotels-list').innerHTML = html;
}

// ── MODAL ACTIVATION ──
function openModal(slug, nom, plan) {
  _activateSlug = slug;
  document.getElementById('modal-hotel-name').textContent = nom + ' — /' + slug;
  document.getElementById('modal-plan').value = plan || 'small';
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  _activateSlug = '';
}
async function confirmActivate() {
  if (!_activateSlug) return;
  var plan   = document.getElementById('modal-plan').value;
  var period = document.getElementById('modal-period').value;
  try {
    var resp = await fetch('/superadmin/hotel/' + _activateSlug + '/subscription', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Auth-Secret': _masterPwd },
      body: JSON.stringify({ plan: plan, billing_period: period })
    });
    var data = await resp.json();
    if (data.ok) { closeModal(); loadHotels(); }
    else alert('Erreur : ' + data.error);
  } catch(e) { alert('Erreur réseau.'); }
}
async function expireHotel(slug) {
  if (!confirm('Marquer "' + slug + '" comme expiré ?')) return;
  await fetch('/superadmin/hotel/' + slug + '/subscription', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'X-Auth-Secret': _masterPwd },
    body: JSON.stringify({ action: 'expire' })
  });
  loadHotels();
}

// ── MIGRATION ──
async function runMigration() {
  if (!confirm('Lancer la migration des colonnes abonnement ?')) return;
  var resp = await fetch('/superadmin/migrate-subscription', {
    method: 'POST', headers: { 'X-Auth-Secret': _masterPwd }
  });
  var d = await resp.json();
  alert(d.ok ? '✅ Migration réussie.' : '❌ ' + JSON.stringify(d));
}

// ── FILTRER ──
function filterHotels() {
  var q = document.getElementById('search-input').value.toLowerCase();
  if (!q) { renderHotels(_allHotels); return; }
  renderHotels(_allHotels.filter(function(h) {
    return (h.nom||'').toLowerCase().includes(q)
        || (h.email||'').toLowerCase().includes(q)
        || (h.slug||'').toLowerCase().includes(q);
  }));
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/'/g,'&#39;');
}
</script>

</body>
</html>
