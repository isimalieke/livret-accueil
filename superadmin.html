<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Assenka · Supervision</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --cover: #2c3e50;
  --blue:  #2563eb;
  --bg:    #f5f5f7;
  --card:  #ffffff;
  --text:  #1d1d1f;
  --text2: #6e6e73;
  --border:rgba(0,0,0,0.09);
  --green: #16a34a;
  --red:   #dc2626;
}
body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

/* LOGIN */
#login-screen { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:20px; }
.login-box { background:var(--cover); border-radius:16px; padding:40px 32px; width:100%; max-width:360px; text-align:center; }
.login-brand { font-size:11px; letter-spacing:4px; text-transform:uppercase; color:rgba(255,255,255,0.5); margin-bottom:8px; }
.login-title { font-size:22px; font-weight:700; color:#fff; margin-bottom:4px; }
.login-sub { font-size:13px; color:rgba(255,255,255,0.5); margin-bottom:28px; }
.login-box input { width:100%; padding:12px 16px; background:rgba(255,255,255,0.12); border:1.5px solid rgba(255,255,255,0.2); border-radius:10px; color:#fff; font-size:15px; text-align:center; outline:none; margin-bottom:12px; font-family:inherit; }
.login-box input::placeholder { color:rgba(255,255,255,0.3); }
.login-box input:focus { border-color:rgba(255,255,255,0.6); }
.login-box button { width:100%; padding:12px; background:#fff; color:var(--cover); border:none; border-radius:10px; font-size:15px; font-weight:700; cursor:pointer; }
.login-error { color:#ff9090; font-size:12px; margin-top:10px; display:none; }

/* PANEL */
#panel { display:none; max-width:960px; margin:0 auto; padding:24px 16px 60px; }

.topbar { background:var(--cover); color:#fff; border-radius:12px; padding:16px 20px; margin-bottom:20px; display:flex; justify-content:space-between; align-items:center; }
.topbar h1 { font-size:16px; font-weight:700; }
.topbar-right { display:flex; gap:10px; align-items:center; }
.stat-badge { background:rgba(255,255,255,0.15); padding:4px 12px; border-radius:20px; font-size:12px; font-weight:600; }
.btn-logout { background:transparent; border:1px solid rgba(255,255,255,0.35); color:#fff; padding:5px 14px; border-radius:8px; font-size:12px; cursor:pointer; }

/* STATS */
.stats-row { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:20px; }
.stat-card { background:var(--card); border-radius:12px; border:1px solid var(--border); padding:16px 20px; }
.stat-val  { font-size:28px; font-weight:700; color:var(--text); }
.stat-lbl  { font-size:11px; color:var(--text2); margin-top:4px; text-transform:uppercase; letter-spacing:0.5px; }

/* SEARCH */
.search-bar { display:flex; gap:10px; margin-bottom:16px; }
.search-bar input { flex:1; padding:10px 14px; background:var(--card); border:1px solid var(--border); border-radius:10px; font-size:14px; outline:none; }
.search-bar input:focus { border-color:var(--blue); }
.btn-refresh { padding:10px 18px; background:var(--blue); color:#fff; border:none; border-radius:10px; font-size:13px; font-weight:600; cursor:pointer; }

/* TABLE */
.table-wrap { background:var(--card); border-radius:12px; border:1px solid var(--border); overflow:hidden; }
.table-head { display:grid; grid-template-columns:2fr 2fr 1.5fr 1fr 1fr 1fr; gap:0; padding:10px 16px; background:var(--bg); border-bottom:1px solid var(--border); }
.th { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:0.6px; color:var(--text2); }
.hotel-row { display:grid; grid-template-columns:2fr 2fr 1.5fr 1fr 1fr 1fr; gap:0; padding:13px 16px; border-bottom:1px solid var(--border); align-items:center; transition:background .1s; }
.hotel-row:last-child { border-bottom:none; }
.hotel-row:hover { background:#fafafa; }
.h-nom    { font-weight:600; font-size:13px; }
.h-email  { font-size:12px; color:var(--text2); }
.h-date   { font-size:11px; color:var(--text2); }
.h-status { display:inline-block; padding:2px 8px; border-radius:10px; font-size:11px; font-weight:600; }
.s-ok  { background:#dcfce7; color:#15803d; }
.s-new { background:#dbeafe; color:#1d4ed8; }
.h-actions { display:flex; gap:6px; }
.btn-view  { padding:4px 10px; background:#f0f4f8; border:1px solid #cbd5e1; color:var(--text); border-radius:6px; font-size:11px; cursor:pointer; text-decoration:none; font-weight:500; }
.btn-admin { padding:4px 10px; background:var(--cover); color:#fff; border:none; border-radius:6px; font-size:11px; cursor:pointer; text-decoration:none; font-weight:500; }

/* EMPTY */
.empty { text-align:center; padding:48px 20px; color:var(--text2); }
.empty-icon { font-size:40px; margin-bottom:12px; opacity:0.3; }

/* LOADING */
.loading { text-align:center; padding:32px; color:var(--text2); font-size:13px; }

@media(max-width:600px) {
  .stats-row { grid-template-columns:1fr 1fr; }
  .table-head, .hotel-row { grid-template-columns:1fr 1fr; }
  .th:nth-child(n+3), .hotel-row > *:nth-child(n+3) { display:none; }
  .h-actions { display:flex !important; }
  .hotel-row > *:nth-child(6) { display:flex !important; }
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-brand">Assenka · Supervision</div>
    <div class="login-title">🔐 Espace Admin</div>
    <div class="login-sub">Accès réservé à l'équipe Assenka</div>
    <input type="password" id="sa-pwd" placeholder="Mot de passe maître" onkeydown="if(event.key==='Enter') saLogin()">
    <button onclick="saLogin()">Accéder →</button>
    <div class="login-error" id="sa-error">Mot de passe incorrect.</div>
  </div>
</div>

<!-- PANEL -->
<div id="panel">
  <div class="topbar">
    <h1>🏢 Supervision · Livret d'Accueil</h1>
    <div class="topbar-right">
      <span class="stat-badge" id="total-badge">0 hôtels</span>
      <button class="btn-logout" onclick="saLogout()">Déconnexion</button>
    </div>
  </div>

  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-val" id="stat-total">—</div>
      <div class="stat-lbl">Établissements</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" id="stat-this-month">—</div>
      <div class="stat-lbl">Ce mois</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" id="stat-today">—</div>
      <div class="stat-lbl">Aujourd'hui</div>
    </div>
  </div>

  <div class="search-bar">
    <input type="text" id="search-input" placeholder="Rechercher un hôtel, email, slug…" oninput="filterHotels()">
    <button class="btn-refresh" onclick="loadHotels()">↻ Actualiser</button>
  </div>

  <div class="table-wrap">
    <div class="table-head">
      <div class="th">Établissement</div>
      <div class="th">Email</div>
      <div class="th">Inscrit le</div>
      <div class="th">Slug</div>
      <div class="th">Statut</div>
      <div class="th">Actions</div>
    </div>
    <div id="hotels-list">
      <div class="loading">Chargement…</div>
    </div>
  </div>
</div>

<script>
var _masterPwd  = '';
var _allHotels  = [];
var _baseUrl    = window.location.origin;

// ── LOGIN ──
function saLogin() {
  var pwd = document.getElementById('sa-pwd').value;
  if (!pwd) return;
  // On teste le mot de passe en appelant l'API avec ce secret
  // Si ça retourne 401 → mauvais mot de passe
  // Pour simplifier le MVP : on stocke le pwd et on l'utilise pour les requêtes API
  _masterPwd = pwd;
  document.getElementById('sa-error').style.display = 'none';
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('panel').style.display = 'block';
  loadHotels();
}

function saLogout() {
  _masterPwd = '';
  _allHotels = [];
  document.getElementById('panel').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('sa-pwd').value = '';
}

// ── CHARGER LA LISTE DES HÔTELS ──
async function loadHotels() {
  document.getElementById('hotels-list').innerHTML = '<div class="loading">⏳ Chargement de la liste…</div>';
  try {
    var resp = await fetch('/superadmin/hotels', {
      headers: { 'X-Auth-Secret': _masterPwd }
    });
    if (resp.status === 401) {
      document.getElementById('panel').style.display = 'none';
      document.getElementById('login-screen').style.display = 'flex';
      document.getElementById('sa-error').style.display = 'block';
      return;
    }
    var data = await resp.json();
    _allHotels = data.hotels || [];
    renderHotels(_allHotels);
    updateStats(_allHotels);
  } catch(e) {
    document.getElementById('hotels-list').innerHTML = '<div class="loading">❌ Erreur de connexion. Vérifiez que le déploiement Cloudflare est à jour.</div>';
  }
}

// ── STATISTIQUES ──
function updateStats(hotels) {
  var total = hotels.length;
  var now = new Date();
  var thisMonth = hotels.filter(function(h) {
    if (!h.created) return false;
    var d = new Date(h.created);
    return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
  }).length;
  var today = hotels.filter(function(h) {
    if (!h.created) return false;
    var d = new Date(h.created);
    return d.toDateString() === now.toDateString();
  }).length;

  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-this-month').textContent = thisMonth;
  document.getElementById('stat-today').textContent = today;
  document.getElementById('total-badge').textContent = total + ' hôtel' + (total > 1 ? 's' : '');
}

// ── AFFICHER LA LISTE ──
function renderHotels(hotels) {
  if (!hotels.length) {
    document.getElementById('hotels-list').innerHTML =
      '<div class="empty"><div class="empty-icon">🏨</div>Aucun établissement inscrit pour le moment.</div>';
    return;
  }

  var html = hotels.map(function(h) {
    var date = h.created ? new Date(h.created).toLocaleDateString('fr-FR') : '—';
    var isNew = h.created && (Date.now() - new Date(h.created).getTime()) < 7 * 86400000;
    var status = isNew
      ? '<span class="h-status s-new">Nouveau</span>'
      : '<span class="h-status s-ok">Actif</span>';
    var livretUrl = _baseUrl + '/' + h.slug;
    var adminUrl  = _baseUrl + '/' + h.slug + '/admin';
    return '<div class="hotel-row">'
      + '<div><div class="h-nom">' + esc(h.nom) + '</div><div style="font-size:11px;color:#9ca3af;">/' + esc(h.slug) + '</div></div>'
      + '<div class="h-email">' + esc(h.email) + '</div>'
      + '<div class="h-date">' + date + '</div>'
      + '<div><code style="font-size:11px;background:#f3f4f6;padding:2px 6px;border-radius:4px">' + esc(h.slug) + '</code></div>'
      + '<div>' + status + '</div>'
      + '<div class="h-actions">'
      + '<a href="' + livretUrl + '" target="_blank" class="btn-view">Livret</a>'
      + '<a href="' + adminUrl  + '" target="_blank" class="btn-admin">Admin</a>'
      + '</div>'
      + '</div>';
  }).join('');

  document.getElementById('hotels-list').innerHTML = html;
}

// ── FILTRER ──
function filterHotels() {
  var q = document.getElementById('search-input').value.toLowerCase();
  if (!q) { renderHotels(_allHotels); return; }
  var filtered = _allHotels.filter(function(h) {
    return (h.nom   || '').toLowerCase().includes(q)
        || (h.email || '').toLowerCase().includes(q)
        || (h.slug  || '').toLowerCase().includes(q);
  });
  renderHotels(filtered);
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>

</body>
</html>
