<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ticket · Livret d'Accueil</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --cover: #2c3e50;
  --blue:  #2563eb;
  --bg:    #f5f5f7;
  --card:  #ffffff;
  --text:  #1d1d1f;
  --text2: #6e6e73;
  --border:rgba(0,0,0,0.09);
  --green: #16a34a;
  --orange:#ea580c;
  --red:   #dc2626;
}
body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

/* TOPBAR */
.topbar { background:var(--cover); padding:14px 16px; display:flex; align-items:center; gap:12px; }
.back-link { color:rgba(255,255,255,0.7); text-decoration:none; font-size:20px; line-height:1; }
.topbar-info { flex:1; }
.topbar-title { color:#fff; font-size:14px; font-weight:600; }
.topbar-sub   { color:rgba(255,255,255,0.55); font-size:11px; margin-top:1px; }
.ticket-badge { background:rgba(255,255,255,0.15); color:#fff; padding:3px 10px; border-radius:20px; font-size:12px; font-family:monospace; font-weight:700; letter-spacing:1px; }

/* MAIN */
.wrap { max-width:560px; margin:0 auto; padding:16px 16px 100px; }

/* STATUS CARD */
.status-card { background:var(--card); border-radius:14px; border:1px solid var(--border); padding:18px 20px; margin-bottom:16px; }
.status-row { display:flex; align-items:center; gap:10px; }
.status-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
.dot-received    { background:#f59e0b; }
.dot-in_progress { background:var(--blue); }
.dot-resolved    { background:var(--green); }
.status-label { font-size:15px; font-weight:600; }
.status-sublabel { font-size:12px; color:var(--text2); margin-top:2px; }
.status-steps { display:flex; gap:0; margin-top:16px; }
.step-pill {
  flex:1; text-align:center; padding:7px 4px; font-size:10px; font-weight:600;
  border:1px solid var(--border); color:var(--text2); background:var(--bg);
  text-transform:uppercase; letter-spacing:0.5px; transition:all .2s;
}
.step-pill:first-child { border-radius:8px 0 0 8px; }
.step-pill:last-child  { border-radius:0 8px 8px 0; border-left:none; }
.step-pill.active { background:var(--blue); color:#fff; border-color:var(--blue); }
.step-pill.done   { background:#dcfce7; color:var(--green); border-color:#86efac; }

/* SUBJECT */
.subject-card { background:var(--card); border-radius:14px; border:1px solid var(--border); padding:16px 20px; margin-bottom:16px; }
.subject-label { font-size:10px; text-transform:uppercase; letter-spacing:1px; color:var(--text2); font-weight:600; margin-bottom:4px; }
.subject-text  { font-size:16px; font-weight:600; }
.subject-meta  { font-size:12px; color:var(--text2); margin-top:6px; }

/* TIMELINE */
.timeline { margin-bottom:16px; }
.tl-label { font-size:10px; text-transform:uppercase; letter-spacing:1px; color:var(--text2); font-weight:600; margin-bottom:10px; padding:0 4px; }
.msg { display:flex; gap:10px; margin-bottom:12px; }
.msg.guest { flex-direction:row-reverse; }
.msg-avatar { width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:14px; flex-shrink:0; }
.msg.guest  .msg-avatar { background:#e0e7ff; }
.msg.hotel  .msg-avatar { background:#f0fdf4; }
.msg-body { max-width:75%; }
.msg-bubble {
  padding:10px 14px; border-radius:14px; font-size:14px; line-height:1.5;
  word-break:break-word;
}
.msg.guest .msg-bubble { background:var(--cover); color:#fff; border-radius:14px 14px 4px 14px; }
.msg.hotel .msg-bubble { background:var(--card); border:1px solid var(--border); color:var(--text); border-radius:14px 14px 14px 4px; }
.msg-time { font-size:10px; color:var(--text2); margin-top:4px; }
.msg.guest .msg-time { text-align:right; }

/* REPLY FORM */
.reply-wrap {
  position:fixed; bottom:0; left:0; right:0;
  background:#fff; border-top:1px solid var(--border);
  padding:12px 16px; display:flex; gap:10px; align-items:flex-end;
  max-width:560px; margin:0 auto;
}
/* Override for full width */
@media(max-width:560px) { .reply-wrap { max-width:100%; } }
.reply-input {
  flex:1; padding:10px 14px; border:1.5px solid var(--border);
  border-radius:10px; font-size:14px; resize:none;
  min-height:40px; max-height:120px; overflow-y:auto;
  font-family:inherit; outline:none;
}
.reply-input:focus { border-color:var(--blue); }
.reply-btn {
  background:var(--cover); color:#fff; border:none;
  width:40px; height:40px; border-radius:10px; font-size:18px;
  cursor:pointer; flex-shrink:0; display:flex; align-items:center; justify-content:center;
}
.reply-btn:disabled { opacity:0.4; }

/* SEARCH CARD */
.search-card { background:var(--card); border-radius:14px; border:1px solid var(--border); padding:18px 20px; margin-bottom:16px; }
.search-card h3 { font-size:14px; font-weight:600; margin-bottom:4px; }
.search-card p  { font-size:12px; color:var(--text2); margin-bottom:12px; }
.search-row { display:flex; gap:8px; }
.search-row input { flex:1; padding:9px 12px; border:1.5px solid var(--border); border-radius:8px; font-size:14px; outline:none; font-family:inherit; }
.search-row input:focus { border-color:var(--blue); }
.btn-search { padding:9px 16px; background:var(--blue); color:#fff; border:none; border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; white-space:nowrap; }
.search-result { margin-top:10px; }
.result-item { background:var(--bg); border-radius:8px; padding:10px 12px; margin-bottom:8px; cursor:pointer; transition:background .15s; }
.result-item:hover { background:#e5e7eb; }
.result-subj { font-size:13px; font-weight:600; }
.result-meta { font-size:11px; color:var(--text2); margin-top:2px; }

/* LOADING / ERROR */
.loading { text-align:center; padding:60px 20px; color:var(--text2); }
.error   { text-align:center; padding:40px 20px; color:var(--red); }

/* RESOLVED NOTICE */
.resolved-notice { background:#f0fdf4; border:1px solid #86efac; border-radius:12px; padding:14px 16px; text-align:center; font-size:13px; color:var(--green); font-weight:600; margin-bottom:12px; }
</style>
</head>
<body>

<div class="topbar" id="topbar">
  <a class="back-link" id="back-link" href="#">←</a>
  <div class="topbar-info">
    <div class="topbar-title" id="topbar-hotel">Livret d'Accueil</div>
    <div class="topbar-sub fr-o" id="topbar-sub">Suivi de ticket</div>
  </div>
  <div class="ticket-badge" id="ticket-badge">…</div>
</div>

<div class="wrap" id="wrap">
  <div class="loading" id="loading">⏳ Chargement du ticket…</div>
  <div class="error" id="error-msg" style="display:none"></div>
</div>

<!-- Panel de recherche (si pas de ticketId dans l'URL) -->
<div class="wrap" id="search-panel" style="display:none">
  <div class="search-card">
    <h3>🔍 Retrouver mon ticket</h3>
    <p>Saisissez votre numéro de téléphone pour retrouver vos signalements.</p>
    <div class="search-row">
      <input type="tel" id="search-phone" placeholder="ex : +221 77 123 45 67" onkeydown="if(event.key==='Enter') searchTickets()">
      <button class="btn-search" onclick="searchTickets()">Chercher</button>
    </div>
    <div class="search-result" id="search-result"></div>
  </div>
</div>

<!-- Reply form (fixed bottom, hidden when resolved) -->
<div class="reply-wrap" id="reply-wrap" style="display:none">
  <textarea class="reply-input" id="reply-input" placeholder="Ajouter un message…" rows="1" oninput="autoResize(this)" onkeydown="handleReplyKey(event)"></textarea>
  <button class="reply-btn" id="reply-btn" onclick="sendReply()" title="Envoyer">➤</button>
</div>

<script>
var _slug    = '';
var _ticketId = '';
var _ticket  = null;
var _lang    = navigator.language.startsWith('fr') ? 'fr' : 'en';

// Extraire slug et ticketId depuis l'URL : /{slug}/ticket/{id}
(function() {
  var parts = window.location.pathname.split('/').filter(Boolean);
  // parts = ['slug', 'ticket', 'id']
  if (parts.length >= 3 && parts[1] === 'ticket') {
    _slug     = parts[0];
    _ticketId = parts[2].toUpperCase();
  } else if (parts.length >= 1) {
    _slug = parts[0];
  }
})();

document.getElementById('back-link').href = _slug ? '/' + _slug : '/';

// ── CHARGEMENT ──
window.addEventListener('load', function() {
  if (_ticketId) {
    loadTicket();
  } else {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('search-panel').style.display = 'block';
    if (_slug) {
      document.getElementById('topbar-sub').textContent = 'Rechercher un ticket';
    }
  }
});

async function loadTicket() {
  try {
    var resp = await fetch('/' + _slug + '/ticket/' + _ticketId + '/data');
    var data = await resp.json();
    if (!data.ok) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('error-msg').style.display = 'block';
      document.getElementById('error-msg').textContent = 'Ticket #' + _ticketId + ' introuvable.';
      document.getElementById('search-panel').style.display = 'block';
      return;
    }
    _ticket = data.ticket;
    render();
  } catch(e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error-msg').style.display = 'block';
    document.getElementById('error-msg').textContent = 'Erreur de connexion. Vérifiez votre connexion internet.';
  }
}

function render() {
  _ticket = _ticket;
  document.getElementById('loading').style.display = 'none';
  document.getElementById('ticket-badge').textContent = '#' + _ticket.id;

  var statusInfo = {
    received:    { label: _lang==='fr' ? 'Reçu' : 'Received',         sub: _lang==='fr' ? 'Votre signalement a été enregistré' : 'Your report has been registered',   dot: 'dot-received',    steps:[true,false,false] },
    in_progress: { label: _lang==='fr' ? 'En traitement' : 'In progress', sub: _lang==='fr' ? "L'hôtelier s'en occupe" : 'The host is handling this',                 dot: 'dot-in_progress', steps:[true,true,false] },
    resolved:    { label: _lang==='fr' ? 'Résolu' : 'Resolved',        sub: _lang==='fr' ? 'Problème résolu — merci de votre signalement' : 'Issue resolved — thank you', dot: 'dot-resolved',    steps:[true,true,true] },
  };
  var si = statusInfo[_ticket.status] || statusInfo.received;
  var stepNames = _lang === 'fr' ? ['Reçu','En traitement','Résolu'] : ['Received','In progress','Resolved'];

  var html = '';

  // Status card
  html += '<div class="status-card">';
  html += '<div class="status-row"><div class="status-dot ' + si.dot + '"></div><div><div class="status-label">' + si.label + '</div><div class="status-sublabel">' + si.sub + '</div></div></div>';
  html += '<div class="status-steps">';
  ['received','in_progress','resolved'].forEach(function(s, i) {
    var cls = si.steps[i] ? (i === ['received','in_progress','resolved'].indexOf(_ticket.status) ? 'active' : 'done') : '';
    html += '<div class="step-pill ' + cls + '">' + stepNames[i] + '</div>';
  });
  html += '</div></div>';

  // Subject card
  var d = new Date(_ticket.created);
  var dateStr = d.toLocaleDateString(_lang === 'fr' ? 'fr-FR' : 'en-GB') + ' ' + d.toLocaleTimeString(_lang === 'fr' ? 'fr-FR' : 'en-GB', {hour:'2-digit', minute:'2-digit'});
  html += '<div class="subject-card">';
  html += '<div class="subject-label">' + (_lang==='fr' ? 'Objet' : 'Subject') + '</div>';
  html += '<div class="subject-text">' + esc(_ticket.subject) + '</div>';
  html += '<div class="subject-meta">' + (_lang==='fr' ? 'Envoyé par ' : 'Sent by ') + esc(_ticket.guestName) + ' · ' + dateStr + '</div>';
  html += '</div>';

  // Resolved notice
  if (_ticket.status === 'resolved') {
    html += '<div class="resolved-notice">✅ ' + (_lang==='fr' ? 'Ce ticket est résolu. Merci de votre patience.' : 'This ticket has been resolved. Thank you for your patience.') + '</div>';
  }

  // Timeline
  if (_ticket.messages && _ticket.messages.length) {
    html += '<div class="timeline">';
    html += '<div class="tl-label">' + (_lang==='fr' ? 'Échanges' : 'Messages') + '</div>';
    _ticket.messages.forEach(function(m) {
      var isGuest = m.from === 'guest';
      var avatar = isGuest ? '👤' : '🏨';
      var t = new Date(m.timestamp);
      var tStr = t.toLocaleDateString(_lang==='fr'?'fr-FR':'en-GB') + ' ' + t.toLocaleTimeString(_lang==='fr'?'fr-FR':'en-GB', {hour:'2-digit',minute:'2-digit'});
      html += '<div class="msg ' + m.from + '">';
      html += '<div class="msg-avatar">' + avatar + '</div>';
      html += '<div class="msg-body">';
      html += '<div class="msg-bubble">' + esc(m.text) + '</div>';
      html += '<div class="msg-time">' + tStr + '</div>';
      html += '</div></div>';
    });
    html += '</div>';
  }

  // Search panel (pour trouver d'autres tickets)
  html += '<div class="search-card" style="margin-top:24px">';
  html += '<h3>🔍 ' + (_lang==='fr' ? 'Autres tickets' : 'Other tickets') + '</h3>';
  html += '<p>' + (_lang==='fr' ? 'Retrouvez tous vos tickets en saisissant votre téléphone.' : 'Find all your tickets by entering your phone number.') + '</p>';
  html += '<div class="search-row"><input type="tel" id="search-phone" placeholder="+221 77 123 45 67" onkeydown="if(event.key===\'Enter\') searchTickets()"><button class="btn-search" onclick="searchTickets()">' + (_lang==='fr' ? 'Chercher' : 'Search') + '</button></div>';
  html += '<div class="search-result" id="search-result"></div></div>';

  document.getElementById('wrap').innerHTML = html;

  // Reply form — caché si résolu
  if (_ticket.status !== 'resolved') {
    document.getElementById('reply-wrap').style.display = 'flex';
  }
}

// ── ENVOYER UN MESSAGE ──
async function sendReply() {
  var input = document.getElementById('reply-input');
  var text  = input ? input.value.trim() : '';
  if (!text) return;

  var btn = document.getElementById('reply-btn');
  btn.disabled = true;
  input.disabled = true;

  try {
    var resp = await fetch('/' + _slug + '/ticket/' + _ticketId + '/message', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ from: 'guest', text: text }),
    });
    var data = await resp.json();
    if (data.ok) {
      _ticket = data.ticket;
      input.value = '';
      render();
    } else {
      alert(data.error || 'Erreur lors de l\'envoi.');
    }
  } catch(e) {
    alert('Erreur de connexion.');
  }
  btn.disabled = false;
  input.disabled = false;
  if (input) input.focus();
}

function handleReplyKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendReply(); }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

// ── RECHERCHE PAR TÉLÉPHONE ──
async function searchTickets() {
  var phone = (document.getElementById('search-phone') || {}).value || '';
  phone = phone.trim();
  if (!phone) return;

  var resultEl = document.getElementById('search-result');
  resultEl.innerHTML = '<div style="font-size:13px;color:#6e6e73;padding:8px 0">Recherche…</div>';

  try {
    var resp = await fetch('/' + _slug + '/tickets/search', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ phone }),
    });
    var data = await resp.json();
    if (!data.ok || !data.tickets.length) {
      resultEl.innerHTML = '<div style="font-size:13px;color:#6e6e73;padding:8px 0">Aucun ticket trouvé pour ce numéro.</div>';
      return;
    }
    var statusLabel = { received: '🟡', in_progress: '🔵', resolved: '✅' };
    var html = data.tickets.map(function(t) {
      return '<div class="result-item" onclick="window.location=\'/' + _slug + '/ticket/' + t.id + '\'">'
        + '<div class="result-subj">' + statusLabel[t.status] + ' ' + esc(t.subject) + '</div>'
        + '<div class="result-meta">#' + t.id + ' · ' + new Date(t.created).toLocaleDateString('fr-FR') + '</div>'
        + '</div>';
    }).join('');
    resultEl.innerHTML = html;
  } catch(e) {
    resultEl.innerHTML = '<div style="font-size:13px;color:#dc2626">Erreur de connexion.</div>';
  }
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}
</script>
</body>
</html>
