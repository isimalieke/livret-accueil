<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ticket · Livret d'Accueil</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --cover: #2c3e50;
  --blue:  #2563eb;
  --bg:    #f0f2f5;
  --card:  #ffffff;
  --text:  #1d1d1f;
  --text2: #6e6e73;
  --border:rgba(0,0,0,0.09);
  --green: #16a34a;
  --orange:#ea580c;
  --red:   #dc2626;
}
body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; display:flex; flex-direction:column; }

/* ── TOPBAR ── */
.topbar { background:var(--cover); padding:14px 16px; display:flex; align-items:center; gap:12px; flex-shrink:0; }
.back-link { color:rgba(255,255,255,0.7); text-decoration:none; font-size:22px; line-height:1; padding:2px 6px; }
.back-link:hover { color:#fff; }
.topbar-info { flex:1; min-width:0; }
.topbar-title { color:#fff; font-size:15px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.topbar-sub   { color:rgba(255,255,255,0.55); font-size:11px; margin-top:1px; }
.ticket-badge { background:rgba(255,255,255,0.15); color:#fff; padding:4px 11px; border-radius:20px; font-size:12px; font-family:monospace; font-weight:700; letter-spacing:1px; white-space:nowrap; }

/* ── STATUS BAR ── */
.status-bar { background:var(--card); border-bottom:1px solid var(--border); padding:10px 16px; flex-shrink:0; }
.status-row { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
.status-dot { width:9px; height:9px; border-radius:50%; flex-shrink:0; }
.dot-received    { background:#f59e0b; box-shadow:0 0 0 3px rgba(245,158,11,.2); }
.dot-in_progress { background:var(--blue); box-shadow:0 0 0 3px rgba(37,99,235,.2); }
.dot-resolved    { background:var(--green); box-shadow:0 0 0 3px rgba(22,163,74,.2); }
.status-label  { font-size:13px; font-weight:600; }
.status-sub    { font-size:11px; color:var(--text2); margin-left:auto; }
.status-steps  { display:flex; gap:3px; }
.step-pill {
  flex:1; text-align:center; padding:5px 2px; font-size:10px; font-weight:600;
  border-radius:6px; color:var(--text2); background:var(--bg);
  text-transform:uppercase; letter-spacing:0.3px;
}
.step-pill.active { background:var(--blue); color:#fff; }
.step-pill.done   { background:#dcfce7; color:var(--green); }

/* ── SUBJECT ── */
.subject-bar { background:#fff8e7; border-bottom:1px solid #fde68a; padding:10px 16px; flex-shrink:0; }
.subject-lbl  { font-size:10px; text-transform:uppercase; letter-spacing:.8px; color:#92400e; font-weight:600; margin-bottom:2px; }
.subject-text { font-size:14px; font-weight:600; color:#78350f; }
.subject-meta { font-size:11px; color:#a16207; margin-top:2px; }

/* ── CHAT ZONE ── */
.chat-zone { flex:1; overflow-y:auto; padding:14px 12px 12px; }

/* Séparateur de date */
.date-sep { text-align:center; margin:18px 0 10px; }
.date-sep span { background:rgba(0,0,0,0.08); color:var(--text2); font-size:11px; font-weight:600; padding:3px 12px; border-radius:20px; }

/* Bulles */
.msg { display:flex; align-items:flex-end; gap:8px; margin-bottom:6px; }
.msg.guest { flex-direction:row-reverse; }
.msg-avatar {
  width:28px; height:28px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:13px; flex-shrink:0; margin-bottom:2px;
}
.msg.guest .msg-avatar { background:var(--cover); color:#fff; }
.msg.hotel .msg-avatar { background:#e5e7eb; }
.msg-col { max-width:78%; display:flex; flex-direction:column; }
.msg.guest .msg-col { align-items:flex-end; }
.msg.hotel .msg-col { align-items:flex-start; }

.msg-sender { font-size:10px; color:var(--text2); font-weight:600; margin-bottom:3px; padding:0 4px; }

.msg-bubble {
  padding:9px 13px; font-size:14px; line-height:1.5;
  word-break:break-word; white-space:pre-wrap;
  max-width:100%;
}
.msg.guest .msg-bubble {
  background:var(--cover); color:#fff;
  border-radius:16px 16px 4px 16px;
}
.msg.hotel .msg-bubble {
  background:#fff; color:var(--text);
  border:1px solid var(--border);
  border-radius:16px 16px 16px 4px;
  box-shadow:0 1px 2px rgba(0,0,0,.06);
}

.msg-time { font-size:10px; color:var(--text2); margin-top:3px; padding:0 4px; }

/* Ticket résolu */
.resolved-banner { background:#f0fdf4; border-top:1px solid #86efac; text-align:center; padding:12px; font-size:13px; color:var(--green); font-weight:600; flex-shrink:0; }

/* ── BARRE DE RÉPONSE ── */
.reply-wrap {
  background:#fff; border-top:1px solid var(--border);
  padding:10px 12px; display:flex; gap:10px; align-items:flex-end;
  flex-shrink:0;
}
.reply-input {
  flex:1; padding:10px 13px; border:1.5px solid var(--border);
  border-radius:22px; font-size:14px; resize:none;
  min-height:42px; max-height:120px; overflow-y:auto;
  font-family:inherit; outline:none; background:var(--bg); line-height:1.4;
}
.reply-input:focus { border-color:var(--cover); background:#fff; }
.reply-btn {
  background:var(--cover); color:#fff; border:none;
  width:42px; height:42px; border-radius:50%; font-size:17px;
  cursor:pointer; flex-shrink:0; display:flex; align-items:center; justify-content:center;
  transition:opacity .15s;
}
.reply-btn:disabled { opacity:0.35; cursor:default; }
.reply-hint { font-size:11px; color:var(--text2); text-align:center; padding:4px 0 2px; flex-shrink:0; }

/* ── SEARCH ── */
.wrap { max-width:560px; margin:0 auto; padding:16px; width:100%; }
.search-card { background:var(--card); border-radius:14px; border:1px solid var(--border); padding:18px 20px; margin-bottom:16px; }
.search-card h3 { font-size:14px; font-weight:600; margin-bottom:4px; }
.search-card p  { font-size:12px; color:var(--text2); margin-bottom:12px; }
.search-row { display:flex; gap:8px; }
.search-row input { flex:1; padding:9px 12px; border:1.5px solid var(--border); border-radius:8px; font-size:14px; outline:none; font-family:inherit; }
.search-row input:focus { border-color:var(--blue); }
.btn-search { padding:9px 16px; background:var(--blue); color:#fff; border:none; border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; white-space:nowrap; }
.search-result { margin-top:10px; }
.result-item { background:var(--bg); border-radius:8px; padding:10px 12px; margin-bottom:8px; cursor:pointer; transition:background .15s; }
.result-item:hover { background:#e5e7eb; }
.result-subj { font-size:13px; font-weight:600; }
.result-meta { font-size:11px; color:var(--text2); margin-top:2px; }

/* ── MISC ── */
.loading { text-align:center; padding:60px 20px; color:var(--text2); }
.error   { text-align:center; padding:40px 20px; color:var(--red); }
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <a class="back-link" id="back-link" href="#">←</a>
  <div class="topbar-info">
    <div class="topbar-title" id="topbar-hotel">Livret d'Accueil</div>
    <div class="topbar-sub" id="topbar-sub">Suivi de ticket</div>
  </div>
  <div class="ticket-badge" id="ticket-badge">…</div>
</div>

<!-- STATUS BAR (injecté dynamiquement) -->
<div id="status-bar-wrap"></div>

<!-- SUBJECT (injecté dynamiquement) -->
<div id="subject-bar-wrap"></div>

<!-- ZONE CHAT -->
<div class="chat-zone" id="chat-zone">
  <div class="loading" id="loading">⏳ Chargement…</div>
  <div class="error" id="error-msg" style="display:none"></div>
</div>

<!-- TICKET RÉSOLU -->
<div class="resolved-banner" id="resolved-banner" style="display:none">
  ✅ Ce ticket est résolu — merci de votre patience.
</div>

<!-- BARRE DE RÉPONSE -->
<div class="reply-wrap" id="reply-wrap" style="display:none">
  <textarea class="reply-input" id="reply-input" placeholder="Votre message…" rows="1"
    oninput="autoResize(this)" onkeydown="handleReplyKey(event)"></textarea>
  <button class="reply-btn" id="reply-btn" onclick="sendReply()" title="Envoyer">➤</button>
</div>

<!-- SEARCH (si pas de ticketId) -->
<div id="search-panel" style="display:none">
  <div class="wrap">
    <div class="search-card">
      <h3>🔍 Retrouver mon ticket</h3>
      <p>Saisissez votre numéro de téléphone pour retrouver vos signalements.</p>
      <div class="search-row">
        <input type="tel" id="search-phone" placeholder="+221 77 123 45 67" onkeydown="if(event.key==='Enter') searchTickets()">
        <button class="btn-search" onclick="searchTickets()">Chercher</button>
      </div>
      <div class="search-result" id="search-result"></div>
    </div>
  </div>
</div>

<script>
var _slug     = '';
var _ticketId = '';
var _ticket   = null;
var _lang     = navigator.language.startsWith('fr') ? 'fr' : 'en';
var fr = _lang === 'fr';

(function() {
  var parts = window.location.pathname.split('/').filter(Boolean);
  if (parts.length >= 3 && parts[1] === 'ticket') {
    _slug = parts[0]; _ticketId = parts[2].toUpperCase();
  } else if (parts.length >= 1) { _slug = parts[0]; }
})();

document.getElementById('back-link').href = _slug ? '/' + _slug : '/';

window.addEventListener('load', function() {
  if (_ticketId) { loadTicket(); }
  else {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('search-panel').style.display = 'block';
  }
});

async function loadTicket() {
  try {
    var resp = await fetch('/' + _slug + '/ticket/' + _ticketId + '/data');
    var data = await resp.json();
    if (!data.ok) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('error-msg').style.display = 'block';
      document.getElementById('error-msg').textContent = 'Ticket #' + _ticketId + ' introuvable.';
      document.getElementById('search-panel').style.display = 'block';
      return;
    }
    _ticket = data.ticket;
    render();
  } catch(e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error-msg').style.display = 'block';
    document.getElementById('error-msg').textContent = fr ? 'Erreur de connexion.' : 'Connection error.';
  }
}

function render() {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('ticket-badge').textContent = '#' + _ticket.id;

  // ── Status bar ──
  var si = {
    received:    { label: fr?'Reçu':'Received',      dot:'dot-received',    steps:[1,0,0] },
    in_progress: { label: fr?'En traitement':'In progress', dot:'dot-in_progress', steps:[1,1,0] },
    resolved:    { label: fr?'Résolu':'Resolved',     dot:'dot-resolved',    steps:[1,1,1] },
  }[_ticket.status] || { label:'', dot:'dot-received', steps:[1,0,0] };
  var stepNames = fr ? ['Reçu','En cours','Résolu'] : ['Received','In progress','Resolved'];
  var stepsHtml = ['received','in_progress','resolved'].map(function(s,i) {
    var cls = si.steps[i] ? (s === _ticket.status ? 'active' : 'done') : '';
    return '<div class="step-pill ' + cls + '">' + stepNames[i] + '</div>';
  }).join('');

  document.getElementById('status-bar-wrap').innerHTML =
    '<div class="status-bar">' +
      '<div class="status-row">' +
        '<div class="status-dot ' + si.dot + '"></div>' +
        '<div class="status-label">' + si.label + '</div>' +
        '<div class="status-sub">#' + _ticket.id + '</div>' +
      '</div>' +
      '<div class="status-steps">' + stepsHtml + '</div>' +
    '</div>';

  // ── Subject bar ──
  var d = new Date(_ticket.created);
  var dateStr = d.toLocaleDateString(fr?'fr-FR':'en-GB') + ' ' + d.toLocaleTimeString(fr?'fr-FR':'en-GB',{hour:'2-digit',minute:'2-digit'});
  document.getElementById('subject-bar-wrap').innerHTML =
    '<div class="subject-bar">' +
      '<div class="subject-lbl">' + (fr?'Objet du signalement':'Subject') + '</div>' +
      '<div class="subject-text">' + esc(_ticket.subject) + '</div>' +
      '<div class="subject-meta">' + esc(_ticket.guestName) + ' · ' + dateStr + '</div>' +
    '</div>';

  // ── Messages ──
  var chatHtml = '';
  var lastDate = '';

  (_ticket.messages || []).forEach(function(m) {
    var isGuest = m.from === 'guest';
    var t = new Date(m.timestamp);
    var dayKey = t.toLocaleDateString(fr?'fr-FR':'en-GB');

    // Séparateur de date
    if (dayKey !== lastDate) {
      lastDate = dayKey;
      var today = new Date();
      var yesterday = new Date(today); yesterday.setDate(today.getDate()-1);
      var label = dayKey;
      if (t.toDateString() === today.toDateString())     label = fr ? "Aujourd'hui" : 'Today';
      else if (t.toDateString() === yesterday.toDateString()) label = fr ? 'Hier' : 'Yesterday';
      chatHtml += '<div class="date-sep"><span>' + label + '</span></div>';
    }

    var tStr = t.toLocaleTimeString(fr?'fr-FR':'en-GB',{hour:'2-digit',minute:'2-digit'});
    var senderLabel = isGuest ? (fr?'Vous':'You') : (fr?'L\'établissement':'The host');
    var avatar = isGuest ? '👤' : '🏨';
    var cls = isGuest ? 'guest' : 'hotel';

    chatHtml +=
      '<div class="msg ' + cls + '">' +
        '<div class="msg-avatar">' + avatar + '</div>' +
        '<div class="msg-col">' +
          '<div class="msg-sender">' + senderLabel + '</div>' +
          '<div class="msg-bubble">' + esc(m.text) + '</div>' +
          '<div class="msg-time">' + tStr + '</div>' +
        '</div>' +
      '</div>';
  });

  document.getElementById('chat-zone').innerHTML = chatHtml || '<div style="text-align:center;padding:40px 0;color:var(--text2);font-size:14px">—</div>';

  // Scroll en bas
  var zone = document.getElementById('chat-zone');
  zone.scrollTop = zone.scrollHeight;

  // Résolu ?
  if (_ticket.status === 'resolved') {
    document.getElementById('resolved-banner').style.display = 'block';
  } else {
    document.getElementById('reply-wrap').style.display = 'flex';
    setTimeout(function(){ var el=document.getElementById('reply-input'); if(el) el.focus(); }, 100);
  }
}

// ── ENVOYER UN MESSAGE ──
async function sendReply() {
  var input = document.getElementById('reply-input');
  var text  = (input ? input.value : '').trim();
  if (!text) return;
  var btn = document.getElementById('reply-btn');
  btn.disabled = true; input.disabled = true;
  try {
    var resp = await fetch('/' + _slug + '/ticket/' + _ticketId + '/message', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ from:'guest', text: text })
    });
    var data = await resp.json();
    if (data.ok) { _ticket = data.ticket; input.value = ''; input.style.height = 'auto'; render(); }
    else alert(data.error || (fr?'Erreur lors de l\'envoi.':'Send error.'));
  } catch(e) { alert(fr?'Erreur de connexion.':'Connection error.'); }
  btn.disabled = false; input.disabled = false;
  if (input) input.focus();
}

function handleReplyKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendReply(); }
}
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

// ── RECHERCHE ──
async function searchTickets() {
  var phone = ((document.getElementById('search-phone')||{}).value||'').trim();
  if (!phone) return;
  var res = document.getElementById('search-result');
  res.innerHTML = '<div style="font-size:13px;color:#6e6e73;padding:8px 0">' + (fr?'Recherche…':'Searching…') + '</div>';
  try {
    var resp = await fetch('/' + _slug + '/tickets/search', {
      method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({phone})
    });
    var data = await resp.json();
    if (!data.ok || !data.tickets.length) {
      res.innerHTML = '<div style="font-size:13px;color:#6e6e73;padding:8px 0">' + (fr?'Aucun ticket trouvé.':'No ticket found.') + '</div>';
      return;
    }
    var icons = { received:'🟡', in_progress:'🔵', resolved:'✅' };
    res.innerHTML = data.tickets.map(function(t) {
      return '<div class="result-item" onclick="window.location=\'/' + _slug + '/ticket/' + t.id + '\'">' +
        '<div class="result-subj">' + icons[t.status] + ' ' + esc(t.subject) + '</div>' +
        '<div class="result-meta">#' + t.id + ' · ' + new Date(t.created).toLocaleDateString(fr?'fr-FR':'en-GB') + '</div>' +
        '</div>';
    }).join('');
  } catch(e) {
    res.innerHTML = '<div style="font-size:13px;color:#dc2626">' + (fr?'Erreur de connexion.':'Connection error.') + '</div>';
  }
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}
</script>
</body>
</html>
